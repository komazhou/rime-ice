# Rime dictionary
# encoding: utf-8
# 
# 这是你的专属聚合大词库。
# 它的核心作用是将雾凇拼音的开源底座与你个人的专业词汇表进行“物理隔离”与“逻辑合并”。

---
name: MetaPY
version: "2026-03-07"
sort: by_weight
# 雾凇拼音自带了极高质量的词频和八股文支持，这里保持 false 避免与底座自身的设置发生冲突。
use_preset_vocabulary: false

import_tables:
  # ==========================================
  # 1. 核心开源底座（必须放在第一位）
  # 直接引入雾凇拼音的主词库。以后雾凇更新，这里会自动继承其新增的几万条词汇。
  # ==========================================
  - cn_dicts/8105     # 字表
  # - cn_dicts/41448  # 大字表（按需启用）（启用时和 8105 同时启用并放在 8105 下面）
  - cn_dicts/base     # 基础词库
  - cn_dicts/ext      # 扩展词库
  - cn_dicts/tencent  # 腾讯词向量（大词库，部署时间较长）
  - cn_dicts/others   # 一些杂项

  # ==========================================
  # 2. 通用拓展词库（提取自你的旧配置）
  # 注意：这些文件必须存放在 Rime 目录下的 cn_dicts 文件夹中
  # ==========================================
  - luna_pinyin

  # ==========================================
  # 3. 你的私人与垂直领域词库（请根据实际文件名修改）
  # 将你之前的专利词库、重庆地名词库等放在这里
  # ==========================================
  - cn_dicts/Mydict
  - cn_dicts/Patent  #专利词库
  # - cn_dicts/luna_pinyin.city_chongqing    #重庆地名
  # - cn_dicts/renmingdiming  #基于 THUOCL 项目的「地名」和「历史名人」词库
  - cn_dicts/custom_contacts  #通讯录
  # - cn_dicts/chongqing_places # 重庆地名词库 (示例，请按需取消注释)

  # ==========================================
  # 4. 个人快捷简码与自造词 (极为推荐)
  # 建议把你旧配置里那一堆独立的“单字”、“二码”提取出来，单独建一个 metapy_shortcuts.dict.yaml 挂载在这里。
  # 这样不仅找起来方便，也不会污染长句词库。
  # ==========================================
  # - metapy_shortcuts          # 个人肌肉记忆简码 (示例，请按需取消注释)
...
