# Rime default settings
# encoding: utf-8
patch:

  # 方案列表
  schema_list:
    # 可以直接删除或注释不需要的方案，对应的 *.schema.yaml 方案文件也可以直接删除
    # 除了 t9，它依赖于 rime_ice，用九宫格别删 rime_ice.schema.yaml
    # - schema: MetaPY              # 元拼 base 小鹤双拼+形辅
    - schema: double_pinyin_flypy
    # - schema: melt_eng
  #菜单
  menu/page_size: 5   #候选词数量

  # 方案选单相关
  switcher:
    caption: 「方案选单」
    hotkeys:
      - Control+Shift+F4
      # - Alt+grave
    # save_options:  # 开关记忆（方案中的 switches），从方案选单（而非快捷键）切换时会记住的选项，需要记忆的开关不能设定 reset
    #   - ascii_punct
    #   - traditionalization
    #   - emoji
    #   - full_shape
    #   - search_single_char
    fold_options: false            # 呼出时是否折叠，多方案时建议折叠 true ，一个方案建议展开 false
    abbreviate_options: true      # 折叠时是否缩写选项
    option_list_separator: ' / '  # 折叠时的选项分隔符

# 中西文切换
#
# good_old_caps_lock:
# true   切换大写
# false  切换中英
# macOS 偏好设置的优先级更高，如果勾选【使用大写锁定键切换“ABC”输入法】则始终会切换输入法。
#
# 切换中英：
# 不同的选项表示：打字打到一半时按下了 CapsLock、Shift、Control 后：
# commit_code  上屏原始的编码，然后切换到英文
# commit_text  上屏拼出的词句，然后切换到英文
# clear        清除未上屏内容，然后切换到英文
# inline_ascii 切换到临时英文模式，按回车上屏后回到中文状态
# noop         屏蔽快捷键，不切换中英，但不要屏蔽 CapsLock
  ascii_composer:
    good_old_caps_lock: true  # true | false
    switch_key:
      Caps_Lock: clear      # commit_code | commit_text | clear
      Shift_L: commit_code  # commit_code | commit_text | inline_ascii | clear | noop
      Shift_R: commit_code  # commit_code | commit_text | inline_ascii | clear | noop
      Control_L: noop       # commit_code | commit_text | inline_ascii | clear | noop
      Control_R: noop       # commit_code | commit_text | inline_ascii | clear | noop
      Eisu_toggle: clear  
###################################################################################


# 下面的 punctuator recognizer key_binder 写了一些所有方案通用的配置项。
# 写在 default.yaml 里，方便多个方案引用，就是不用每个方案都写一遍了。


# 标点符号
# 设置为一个映射，就自动上屏；设置为多个映射，如 '/' : [ '/', ÷ ] 则进行复选。
#   full_shape: 全角没改，使用预设值
#   half_shape: 标点符号全部直接上屏，和 macOS 自带输入法的区别是

  punctuator:
    # import_preset: symbols  # 参考https://www.bilibili.com/read/cv15134880
    full_shape:
      ' ' : { commit: '　' }
      ',' : ，
      '.' : 。
      '<' : 《
      '>' : 》
      '/' : ／
      '?' : ？
      ';' : ；
      ':' : ：
      '''' : { pair: [ '‘', '’' ] }
      '"' : { pair: [ '“', '”' ] }
      '\' : 、
      '|' : ｜
      '`' : ·
      '~' : ～
      '!' : ！
      '@' : ＠
      '#' : ＃
      '$' : ￥
      '%' : ％
      '^' : ……
      '&' : ＆
      '*' : ＊
      '(' : （
      ')' : ）
      '-' : －
      '_' : ——
      '+' : ＋
      '=' : ＝
      '[' : 【
      ']' : 】
      '{' : ｛
      '}' : ｝
    half_shape:
      ',' : '，'
      '.' : '。'
      '<' : '《'
      '>' : '》'
      '/' : '/'
      '?' : '？'
      ';' : '；'
      ':' : '：'
      '''' : { pair: [ '‘', '’' ] }
      '"' : { pair: [ '“', '”' ] }
      '\' : '、'
      '|' : '｜'
      '`' : '·'
      '~' : '～'
      '!' : '！'
      '@' : '@'
      '#' : '#'
      '%' : '%'
      '$' : '¥'
      '^' : '……'
      '&' : '&'
      '*' : '*'
      '(' : '（'
      ')' : '）'
      '-' : '-'
      '_' : ——
      '+' : '+'
      '=' : '='
      '[' : '【'
      ']' : '】'
      '{' : '｛'
      '}' : '｝'
  #   symbols:
  #     "/help": [符號：/fh, 單位：/dw, 標點：/bd, 數學：/sx, 拼音：/py, 星號：/xh, 方塊：/fk, 幾何：/jh, 箭頭：/jt, 電腦：/dn, 羅馬數字：/lm, 大写羅馬數字：/lmd, 拉丁：/ld, 上標：/sb, 下標：/xb, 希臘字母：/xl, 大写希臘字母：/xld, 數字：/0到/9, 分數：/fs, いろは順：/iro, 假名：/jm或/pjm或/jmk到/jmo, 假名+圈：/jmq, 假名+半角：/jmbj, 俄語：/ey, 大写俄語：/eyd, 韓文：/hw, 韓文+圈：/hwq, 韓文+弧：/hwh, 結構：/jg, 偏旁：/pp, 康熙（部首）：/kx, 筆畫：/bh, 註音：/zy, 聲調：/sd, 漢字+圈：/hzq, 漢字+弧：/hzh, 數字+圈：/szq, 數字+弧：/szh, 數字+點：/szd, 字母+圈：/zmq, 字母+弧：/zmh, 表情：/bq, 音樂：/yy, 月份：/yf, 日期：/rq, 曜日：/yr, 時間：/sj, 天干：/tg, 地支：/dz, 干支：/gz, 節氣：/jq, 象棋：/xq, 麻將：/mj, 色子：/sz, 撲克：/pk, 八卦：/bg, 八卦名：/bgm, 六十四卦：/lssg, 六十四卦名：/lssgm, 太玄經：/txj, 天體：/tt, 星座：/xz, 星座名：/xzm, 十二宮：/seg, 蘇州碼：/szm]


# 处理符合特定规则的输入码，如网址、反查
# 此处配置较为通用的选项，各方案中另增加了和方案功能绑定的 patterns。
  recognizer:
    patterns:
      email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"  # 匹配电子邮件地址
      expression: "^=.*$" #启用计算器=号引导
      punct: "^/([0-9]+[a-z]*|[a-z]+)$" #特殊符号引导
      # uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
      uppercase: "[U][-_+.'A-Za-z]*$"
      url: "^(www[.]|https?:|ftp[.:]|mailto:|file:|localhost).*$|^[a-z]+[.].+$"
      url_2: "^[a-z]+[.]"
#      uppercase: "" #中文状态大写锁定直接上屏  
      radical_lookup: "^U[a-z]+'?$"
      flypydz: "[a-z`]*`+[a-z`]*"

  key_binder/bindings:
    # - { accept: "Control+Shift+4", toggle: simplification, when: always }
    # - { accept: "Control+Shift+T", toggle: simplification, when: always }
    # - { accept: "Control+Shift+A", toggle: ascii_punct, when: always }
    - { accept: "Shift+Tab", send: "Shift+Left", when: composing }
    - { accept: Tab, send: "Shift+Right", when: composing }
    # - { accept: minus, send: Page_Up, when: composing }
    # - { accept: equal, send: Page_Down, when: composing }
    - { accept: minus, send: Page_Up, when: paging} #减号向前翻页
    - { accept: equal, send: Page_Down, when: has_menu} #等于号向后翻页
    - { accept: semicolon, send: 2, when: has_menu}  #打字时，冒号选中第2个候选字发送
    # - {when: always, accept: Control+Shift+Alt+E, set_option: ascii_mode} #
    # - { accept: apostrophe, send: 3, when: has_menu} #打字时，引号选中第3个候选字发送
    # - { accept: Tab, send: Down, when: has_menu} #打字时，Tab和Shift+Tab切换候选
    # - { accept: Shift+Tab, send: Up, when: has_menu} #打字时，Tab和Shift+Tab切换候选
    # - { accept: Control+space, toggle: ascii_mode, when: always}
    # 将小键盘 0~9 . 映射到主键盘，数字金额大写的 Lua 如 R1234.5678 可使用小键盘输入
    - {accept: KP_0, send: 0, when: composing}
    - {accept: KP_1, send: 1, when: composing}
    - {accept: KP_2, send: 2, when: composing}
    - {accept: KP_3, send: 3, when: composing}
    - {accept: KP_4, send: 4, when: composing}
    - {accept: KP_5, send: 5, when: composing}
    - {accept: KP_6, send: 6, when: composing}
    - {accept: KP_7, send: 7, when: composing}
    - {accept: KP_8, send: 8, when: composing}
    - {accept: KP_9, send: 9, when: composing}
    - {accept: KP_Decimal, send: period, when: composing}
    # 将小键盘 + - * / 映射到主键盘，使计算器 如 1+2-3*4 可使用小键盘输入
    - {accept: KP_Multiply, send: asterisk, when: composing}
    - {accept: KP_Add,      send: plus,     when: composing}
    - {accept: KP_Subtract, send: minus,    when: composing}
    - {accept: KP_Divide,   send: slash,    when: composing}

