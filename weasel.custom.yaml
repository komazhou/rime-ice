# Weasel settings
# encoding: utf-8

customization:
  distribution_code_name: Weasel
  distribution_version: 0.14.3
  generator: "Weasel::UIStyleSettings"
  modified_time: "Sun Sep  4 11:36:26 2022"
  rime_version: 1.5.3
  #补丁的修改方式有两种：
  # 1、采用层级展开方式，需要对下级所有对象都进行参数设置，否则会丢失未设置对象的默认参数；对部分参数修改不推荐使用
  # 2、采用斜杠的添加方式可以对指定对象打进行参数的补丁设置，其他为设置对象保留默认参数。推荐使用
  # 如："style/inline_preedit": true 这样表示单独对inline_preedit打补丁，对style的其他设置无影响
  # 双引号、单引号和不加引号的效果一样，建议使用双引号
  # color_scheme下颜色支持透明度设定，格式0xaabbggrr
  # ★标记的是新增参数
patch:
  # __include: my_color_schemes
  # __include: font_face_settings
  # __include: lost_temple

  # [app_options]
# 针对特定应用的设置
  app_options:
    firefox.exe:
      inline_preedit: true # 行内显示预编辑区：规避 <https://github.com/rime/weasel/issues/946>
    iexplore.exe:
      inline_preedit: true # 兼容 IE
    # browser.exe:
    #   inline_preedit: true # 兼容 Yandex
    totalcmd64.exe:
      ascii_mode: true
    totalcmd.exe:
      ascii_mode: true
    gvim.exe:
      ascii_mode: true
      vim_mode: true
    photoshop.exe:
      ascii_mode: true
    acad.exe:
      ascii_mode: true
    i_view32.exe:
      ascii_mode: true
    i_view64.exe:
      ascii_mode: true
    tcmatch64.exe:
      ascii_mode: true
    mathtype.exe:
      ascii_mode: true
    putty.exe:
      ascii_mode: true
    jpegview.exe:
      ascii_mode: true

  # [global settings]
  show_notifications: true                   # 是否显示状态变化的通知：true；false；option_list（方案内的开头 option）
  show_notifications_time: 1200              # 通知显示的时间，单位 ms
  global_ascii: false                        # 切换为 ascii 模式时，是否影响所有窗口：true；false
  # [End of <global settings>]

  # [style]
  # 字体；候选项、候选窗口的行为、布局及样式
  style:
    color_scheme: AmenDracula             # 默认配色方案
    color_scheme_dark: AmenDracula         # 深色模式下，Weasel 的配色方案，Windows 10 1809+ 可用

    # 全局字体
    # 格式：字体1:起始码位:结束码位:字重:字形,字体2……，字体会依次 fallback
    # 详细设定请参考 <https://github.com/rime/weasel/wiki/字體設定>
    font_face: "Microsoft YaHei, Segoe UI Emoji, SF Pro, Noto Color Emoji"
    # font_face: "Segoe UI Emoji:30:39, Segoe UI Emoji:23:23, Segoe UI Emoji:2a:2a, Segoe UI Emoji:fe0f:fe0f, Segoe UI Emoji:20e3:20e3, Microsoft YaHei, SF Pro, Segoe UI Emoji, Noto Color Emoji"
    label_font_face: "Microsoft YaHei"       # 标签字体
    comment_font_face: "Microsoft YaHei"     # 注释字体
    # font_face:          "LXGW Wenkai Narrow:7c:7c, Segoe UI Emoji:30:39, Segoe UI Emoji:23:23, Segoe UI Emoji:2a:2a, Segoe UI Emoji:fe0f:fe0f, Segoe UI Emoji:20e3:20e3, LXGW Wenkai Narrow, Segoe UI Emoji, WB091:E000:E200, Noto Color Emoji SVG, Arial:600:6ff"
    # label_font_face:    "Segoe UI Emoji:30:39, WB091:E000:E200, Noto Color Emoji SVG, Arial:600:6ff, LXGW Wenkai Narrow"
    # comment_font_face:  "Segoe UI Emoji:30:39, WB091:E000:E200, Noto Color Emoji SVG, Arial:600:6ff, LXGW Wenkai Narrow"
    font_point: 12                           # 全局字体字号
    label_font_point: 12                     # 标签字体字号，不设定 fallback 到 font_point
    comment_font_point: 10                   # 注释字体字号，不设定 fallback 到 font_point

    inline_preedit: true                     # 行内显示预编辑区：true；false
    preedit_type: composition                # 预编辑区内容：composition（编码）； preview（选中的候选）；preview_all（全部候选）
  
    fullscreen: false                        # 候选窗口全屏显示：true；false
    vertical_text: false                     # 竖排文本：true；false
    # text_orientation: horizontal           # 文本排列方向，效果和 `vertical_text` 相同：horizontal；vertical
    candidate_list_layout: stacked           # stacked | linear  候选项排列方向（小狼毫可能没有这个参数；如果需要修改为水平布局，可以在custom文件内修改horizontal为true）
    horizontal: false                        # 候选项水平排列（在custom内和candidate_list_layout的linear效果一样）
    vertical_text_left_to_right: false       # 竖排方向是否从左到右：true；false
    vertical_text_with_wrap: false           # 文本竖排模式下，自动换行：true；false
    vertical_auto_reverse: false             # 文本竖排模式下，候选窗口位于光标上方时倒序排列：true；false
  
    label_format: "%s"                       # 标签字符：例如 %s. 效果为 1. 2. 3. ....
    mark_text: "|"                           # 标记字符，显示在选中的候选标签前，需要在配色方案中指定颜色；如该项为空字符串 "" 而配色方案中 hilited_mark_color 非透明色，则显示 Windows 11 输入法风格标记
    ascii_tip_follow_cursor: true            # 切换 ASCII 模式时，提示跟随鼠标，而非输入光标
    enhanced_position: true                  # 无法定位候选框时，在窗口左上角显示候选框：true；false
    display_tray_icon: false                 # 托盘显示独立于语言栏的额外图标：true；false
    antialias_mode: default                  # 次像素反锯齿设定：default；force_dword；cleartype；grayscale；aliased
    candidate_abbreviate_length: 30          # 候选项略写，超过此数字则用省略号代替。设置为 0 则不启用此功能
    mouse_hover_ms: 0                        # ! 已弃用。鼠标悬停选词响应时间（ms），设置为 0 时禁用该功能
    hover_type: none                         # 鼠标在候选窗口悬停时：none（无动作）；hilite（选中鼠标下的候选）；semi_hilite（高亮鼠标下的候选）
    paging_on_scroll: true                   # 在候选窗口上滑动滚轮的行为：true（翻页）；false （选中下一个候选）
    click_to_capture: false                  # 鼠标点击候选项，创建截图：true；false

    layout:
      baseline: 0                            # 字号百分比，与 linespacing 一同设置可解决字体跳动问题，设置为 0 为禁用
      linespacing: 0                         # 字号百分比，参考 <https://github.com/rime/weasel/pull/1177>
      align_type: center                     # 标签、候选文字、注解文字之间的相对对齐方式：top ; center ; bottom
      max_height: 0                          # 候选框最大高度，horizontal 布局如宽超此尺寸则换行显示候选，设置为 0 不启用此功能
      max_width: 1600                        # 候选框最大宽度，文本竖排模式下如高度超此尺寸则换列显示候选，设置为 0 不启用此功能
      min_height: 0                          # 候选框最小高度
      min_width: 150                         # 候选框最小宽度
      border_width: 2                        # 边框宽度；又名 border
      margin_x: 5                           # 主体元素和候选框的左右边距；为负值时，不显示候选框
      margin_y: 5                           # 主体元素的上下边距；为负值时，不显示候选框
      spacing: 13                            # inline_preedit 为否时，编码区域和候选区域的间距
      candidate_spacing: 10                  # 候选项之间的间距
      hilite_spacing: 3                      # 候选项和相应标签的间距
      hilite_padding: 3                      # 高亮区域和内部文字的间距，影响高亮区域大小
      # hilite_padding_x: 8                  # 高亮区域和内部文字的左右间距，如无特殊指定则依 hilite_padding 设置
      # hilite_padding_y: 8                  # 高亮区域和内部文字的上下间距，如无特殊指定则依 hilite_padding 设置
      shadow_radius: 10                      # 阴影区域半径，为 0 不显示阴影；需要同时在配色方案中指定非透明的阴影颜色
      shadow_offset_x: 4                     # 阴影左右偏移距离
      shadow_offset_y: 4                     # 阴影上下偏移距离
      corner_radius: 5                       # 候选窗口圆角半径
      round_corner: 5                        # 候选背景色块圆角半径，又名 hilited_corner_radius
      # type: vertical                       # 布局设置，效果和 style 下的设置相同：
                                           # horizontal（横向）；vertical（竖向） ; vertical_text（竖排文本） ; vertical+fullscreen（全屏） ; horizontal+fullscreen（横向全屏）
  # [End of <style>]

  preset_color_schemes:
    # 以下是一个配色方案示例
    nord:                                      # 在 `style/color_schema` 指定的配色方案值
      name: "远山／Nord"                       # 方案设置中显示的配色名称
      author: Mirtle                           # 配色作者名称
      color_format: rgba                       # 颜色格式：argb（0xaarrggbb）；rgba（0xrrggbbaa）；abgr（0xaabbggrr 默认）
      # 默认配色
      text_color: 0x2E3440                     # 文字
      shadow_color: 0x000000b4                 # 阴影
      label_color: 0x4C566A                    # 标签
      comment_text_color: 0xD08770             # 注释
      border_color: 0xECEFF4                   # 边框
      back_color: 0xECEFF4                     # 背景
      # 普通候选项配色
      candidate_back_color: 0xECEFF4           # 背景
      # candidate_border_color:                # 边框
      # candidate_shadow_color:                # 阴影
      candidate_text_color: 0x2E3440           # 文字
      # 编码区域配色
      hilited_text_color: 0x000000             # 文字
      hilited_back_color: 0xEBCB8B             # 背景
      # hilited_shadow_color:                  # 阴影
      # 选中的候选区域配色
      hilited_mark_color: 0xBF616A             # 标签前的标记
      hilited_label_color: 0x4C566A            # 标签
      hilited_comment_text_color: 0xBF616A     # 注释
      hilited_candidate_text_color: 0x2E3440   # 文字
      hilited_candidate_border_color: 0x8FBCBB # 边框
      hilited_candidate_back_color: 0x8FBCBB   # 背景
      # hilited_candidate_shadow_color:        # 阴影
      # inline_preedit: false 时翻页箭头颜色，不设置则不显示箭头
      # nextpage_color: 0x000000               # 下一页
      # prevpage_color: 0x000000               # 上一页

    # 阿闷的 Dracula 配色
    # 颜色代码格式为带 0x 的 BGR，非 RGB
    AmenDracula:
      name: 阿闷 / AmenDracula
      author: 阿闷
      back_color: 0x362A28                    # 整体候选框的背景颜色
      border_color: 0x362A28                  # 整体候选框的边框颜色

      text_color: 0xF993BD                    # preedit 的字体颜色
      hilited_text_color: 0xF2F8F8            # 被选中的 preedit 的字体颜色
      hilited_back_color: 0xC679FF            # 被选中的 preedit 的背景颜色

      hilited_candidate_back_color: 0xC679FF  # 被选中的候选词的背景颜色
      hilited_label_color: 0xFDE98B           # 被选中的候选词序号字体颜色
      hilited_candidate_text_color: 0xF2F8F8  # 被选中的候选词的字体颜色
      hilited_comment_text_color: 0x5A4744    # 被选中的候选词右边提示文本的字体颜色

      label_color: 0xFDE98B                   # 其它候选词序号的字体颜色
      candidate_text_color: 0xF993BD          # 其它候选词的字体颜色
      comment_text_color: 0xA47262            # 其它候选词右边提示文本的字体颜色

    dracula:
      name: dracula
      horizontal: true
      candidate_format: "%c %@ "
      font_point: 16
      label_font_point: 14
      corner_radius: 5
      line_spacing: 10
      back_color: 0x362A28
      border_color: 0x362A28
      text_color: 0x6CB8FF
      hilited_text_color: 0x5A4744
      hilited_back_color: 0xF2F8F8
      hilited_candidate_label_color: 0xfafafa
      hilited_candidate_text_color: 0xF2F8F8
      hilited_candidate_back_color: 0xC679FF
      hilited_comment_text_color: 0x362b00
      candidate_text_color: 0xF993BD
      comment_text_color: 0xFDE98B
      inline_preedit: true
      
    dracula_light:
      name: dracula_light
      horizontal: true
      candidate_format: "%c %@ "
      font_point: 16
      label_font_point: 14
      corner_radius: 5
      line_spacing: 10
      back_color: 0xF2F8F8
      border_color: 0xF2F8F8
      text_color: 0x362A28
      hilited_text_color: 0x362A28
      hilited_back_color: 0xF2F8F8
      hilited_candidate_label_color: 0xF2F8F8
      hilited_candidate_text_color:  0xF2F8F8
      hilited_candidate_back_color: 0xC679FF
      hilited_comment_text_color: 0x362b00
      candidate_text_color: 0x362A28
      comment_text_color: 0x5A4744
      inline_preedit: true
    
    mint_light_blue:
      name: "蓝水鸭／Mint Light Blue"
      author: Mintimate <"Mintimate's Blog">
      # 拼音串
      text_color: 0x6495ed 
      # 背景
      back_color: 0xefefef 
